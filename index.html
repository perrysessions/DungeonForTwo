<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dungeon For Two</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="rotate-msg">
    <span>📱</span>
    <p>Please rotate your device<br>to landscape to play</p>
  </div>
  <div id="game-root">
    <aside id="panel-left" class="panel"></aside>
    <main id="stage">
      <canvas id="canvas" width="768" height="576"></canvas>
      <div id="overlay" class="hidden"></div>
      <button id="settings-btn" title="Settings (Esc)">⚙</button>
      <div id="settings-modal" class="hidden">
        <div id="settings-panel">
          <h2>Settings</h2>
          <div class="setting-row">
            <label>Music Volume</label>
            <input type="range" id="vol-music" min="0" max="100" value="25">
            <span id="vol-music-val">25%</span>
          </div>
          <div class="setting-row">
            <label>SFX Volume</label>
            <input type="range" id="vol-sfx" min="0" max="100" value="70">
            <span id="vol-sfx-val">70%</span>
          </div>
          <hr>
          <div id="restart-area">
            <button id="restart-btn">Restart Run</button>
            <div id="restart-confirm" class="hidden">
              <p>Abandon this run and start over?</p>
              <button id="restart-yes">Yes, restart</button>
              <button id="restart-no">Cancel</button>
            </div>
          </div>
          <button id="hs-view-btn">Hall of Records</button>
          <div id="hs-view-panel" class="hidden">
            <hr>
            <p style="font-size:12px;color:#aaa;margin:4px 0 6px;text-align:center">— Hall of Records —</p>
            <div id="hs-view-table"></div>
          </div>
          <button id="settings-close">Close</button>
        </div>
      </div>
    </main>
    <aside id="panel-right" class="panel"></aside>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
